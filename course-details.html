<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Course Details - EduPlatform</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div id="sidebar-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:99"></div>

<div class="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar__logo">
      <div class="sidebar__logo-mark">&#127891;</div>
      <span class="sidebar__logo-name">EduPlatform</span>
    </div>
    <div class="sidebar__user">
      <div class="sidebar__avatar" id="sidebar-avatar">U</div>
      <div>
        <div class="sidebar__user-name" id="sidebar-user-name">Loading...</div>
        <div class="sidebar__user-role" id="sidebar-user-role">-</div>
      </div>
    </div>
    <nav class="sidebar__nav" id="sidebar-nav"></nav>
    <div class="sidebar__bottom">
      <button class="sidebar__logout" id="logout-btn">
        <span class="nav-icon">&#128682;</span> Sign Out
      </button>
    </div>
  </aside>

  <div class="main-content">
    <header class="topbar">
      <div class="topbar__left">
        <button class="menu-toggle" id="menu-toggle">&#9776;</button>
        <button class="sidebar-peek-toggle" id="sidebar-peek-toggle" title="Toggle sidebar">&#9776;</button>
        <div>
          <div class="topbar__title" id="page-title">Course Details</div>
          <div class="topbar__breadcrumb">
            <a href="dashboard.html">Home</a> &rsaquo;
            <a href="courses.html">Courses</a> &rsaquo;
            <span id="course-title-crumb">Loading...</span>
          </div>
        </div>
      </div>
      <div class="topbar__right">
        <div class="topbar-search">
          <span class="search-icon">&#128269;</span>
          <input type="text" placeholder="Search..." />
        </div>
        <div style="font-size:13px;font-weight:600;color:var(--navy)" id="topbar-user-name"></div>
      </div>
    </header>

    <main class="page-body" id="course-content">
      <div style="display:flex;align-items:center;justify-content:center;min-height:50vh">
        <div style="width:40px;height:40px;border:3px solid #e2e8f0;border-top-color:#f59e0b;border-radius:50%;animation:spin 0.7s linear infinite"></div>
      </div>
    </main>
  </div>
</div>

<div class="modal-overlay" id="add-lesson-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Add New Lesson</div>
      <button class="modal-close" data-close-modal="add-lesson-modal">&times;</button>
    </div>
    <form id="add-lesson-form" novalidate>
      <div class="form-group">
        <label>Lesson Title</label>
        <input type="text" id="lesson-title" placeholder="e.g. Variables and Data Types" />
        <div class="field-error"></div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Type</label>
          <select id="lesson-type">
            <option value="video">Video</option>
            <option value="article">Article</option>
            <option value="quiz">Quiz</option>
          </select>
        </div>
        <div class="form-group">
          <label>Duration</label>
          <input type="text" id="lesson-duration" placeholder="e.g. 14 min" />
        </div>
      </div>
      <div class="form-group">
        <label>Video URL (optional)</label>
        <input type="url" id="lesson-url" placeholder="https://..." />
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea id="lesson-desc" rows="3" placeholder="Brief description..." style="resize:vertical"></textarea>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn-secondary" data-close-modal="add-lesson-modal">Cancel</button>
        <button type="submit" class="btn-amber" id="add-lesson-btn">Add Lesson</button>
      </div>
    </form>
  </div>
</div>

<script src="js/main.js"></script>
<script>
  requireAuth();
  populateSidebarUser();

  const user = getUser();
  const isTeacher = user?.role === 'teacher';
  const courseId = getParam('id') || '1';
  if (!isTeacher) document.body.classList.add('student-shell');

  const teacherNav = [
    { icon: '&#127968;', label: 'Dashboard', page: 'dashboard.html' },
    { icon: '&#128218;', label: 'Courses', page: 'courses.html' },
    { icon: '&#128221;', label: 'Exams', page: 'exams.html' },
    { icon: '&#128101;', label: 'Students', page: 'dashboard.html?view=students' },
    { icon: '&#128202;', label: 'Analytics', page: 'dashboard.html?view=analytics' },
    { icon: '&#9881;', label: 'Settings', page: 'dashboard.html?view=settings' },
  ];
  const studentNav = [
    { icon: '&#127968;', label: 'Dashboard', page: 'dashboard.html' },
    { icon: '&#128218;', label: 'My Courses', page: 'courses.html' },
    { icon: '&#128221;', label: 'My Exams', page: 'exams.html', badge: '2' },
    { icon: '&#127942;', label: 'Progress', page: 'dashboard.html?view=progress' },
    { icon: '&#128197;', label: 'Schedule', page: 'dashboard.html?view=schedule' },
    { icon: '&#9881;', label: 'Settings', page: 'dashboard.html?view=settings' },
  ];

  document.getElementById('sidebar-nav').innerHTML =
    '<div class="sidebar__nav-section">Workspace</div>' +
    (isTeacher ? teacherNav : studentNav).map((item) => `
      <a href="${item.page}" class="nav-item" data-page="${item.page}">
        <span class="nav-icon">${item.icon}</span>
        <span>${item.label}</span>
        ${item.badge ? `<span class="nav-badge">${item.badge}</span>` : ''}
      </a>
    `).join('');

  document.querySelectorAll('#sidebar-nav .nav-item').forEach((item) => {
    if (item.getAttribute('href') === 'courses.html') item.classList.add('active');
  });

  document.getElementById('sidebar-peek-toggle')?.addEventListener('click', () => {
    if (isTeacher) return;
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebar-overlay');
    const open = sidebar.classList.toggle('open');
    overlay.style.display = open ? 'block' : 'none';
  });
  document.getElementById('sidebar-overlay')?.addEventListener('click', () => {
    if (isTeacher) return;
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebar-overlay').style.display = 'none';
  });

  async function loadCourse() {
    const [course, lessons] = await Promise.all([
      api.get(`/courses/${courseId}`),
      api.get(`/courses/${courseId}/lessons`),
    ]);

    document.getElementById('course-title-crumb').textContent = course.title;
    document.title = `${course.title} - EduPlatform`;

    const completedCount = lessons.filter((lesson) => lesson.completed).length;
    const progressPct = Math.round((completedCount / Math.max(lessons.length, 1)) * 100);

    document.getElementById('course-content').innerHTML = `
      <div class="course-hero">
        <div class="course-hero__icon">${course.emoji || '&#128218;'}</div>
        <div class="course-hero__content">
          <div class="course-hero__category">${course.category}</div>
          <div class="course-hero__title">${course.title}</div>
          <div class="course-hero__desc">${course.description}</div>
          <div class="course-hero__tags">
            <span class="course-hero__tag">&#11088; ${course.rating} rating</span>
            <span class="course-hero__tag">&#128101; ${(course.studentsCount || 0).toLocaleString()} students</span>
            <span class="course-hero__tag">&#128337; ${course.duration}</span>
            <span class="course-hero__tag">${course.level}</span>
          </div>
        </div>
      </div>

      <div class="course-details-grid">
        <div>
          <div class="section-header">
            <div class="section-title">Course Lessons (${lessons.length})</div>
            ${isTeacher
              ? `<button class="btn-amber" onclick="openModal('add-lesson-modal')">+ Add Lesson</button>`
              : `<span style="font-size:13px;color:var(--gray-400)">${completedCount}/${lessons.length} completed</span>`}
          </div>

          ${!isTeacher ? `
            <div class="course-card__progress-bar" style="margin-bottom:20px;height:6px">
              <div class="course-card__progress-fill" style="width:${progressPct}%"></div>
            </div>
          ` : ''}

          <div class="lessons-list">
            ${lessons.map((lesson, index) => `
              <div class="lesson-item ${lesson.completed ? 'completed' : ''} ${lesson.active ? 'active' : ''} ${lesson.locked ? 'locked' : ''}"
                   onclick="${lesson.locked ? '' : `window.location.href='video-lesson.html?courseId=${courseId}&lessonId=${lesson.id}'`}">
                <div class="lesson-num">${lesson.completed ? '&#10003;' : lesson.locked ? '&#128274;' : index + 1}</div>
                <div class="lesson-info">
                  <div class="lesson-title">${lesson.title}</div>
                  <div class="lesson-meta">
                    <span>${lesson.type}</span>
                    <span>&#128337; ${lesson.duration}</span>
                  </div>
                </div>
                <div class="lesson-type">
                  ${lesson.completed
                    ? '<span class="badge badge-green">Done</span>'
                    : lesson.locked
                      ? '<span class="badge badge-gray">Locked</span>'
                      : `<span class="badge badge-amber">${lesson.active ? 'In Progress' : 'Start'}</span>`}
                </div>
              </div>
            `).join('')}
          </div>
        </div>

        <div>
          <div class="info-card">
            <h3>Course Info</h3>
            <div class="info-row"><span class="info-row-label">Instructor</span><span class="info-row-value">${course.instructorName}</span></div>
            <div class="info-row"><span class="info-row-label">Level</span><span class="info-row-value">${course.level}</span></div>
            <div class="info-row"><span class="info-row-label">Duration</span><span class="info-row-value">${course.duration}</span></div>
            <div class="info-row"><span class="info-row-label">Lessons</span><span class="info-row-value">${lessons.length}</span></div>
            <div class="info-row"><span class="info-row-label">Rating</span><span class="info-row-value">&#11088; ${course.rating}</span></div>
            <div class="info-row"><span class="info-row-label">Students</span><span class="info-row-value">${(course.studentsCount || 0).toLocaleString()}</span></div>
            ${!isTeacher ? `<div class="info-row"><span class="info-row-label">Your Progress</span><span class="info-row-value" style="color:var(--amber-dark)">${progressPct}%</span></div>` : ''}
          </div>

          ${!isTeacher ? `
            <div class="info-card" style="margin-top:16px">
              <h3>Continue Learning</h3>
              <p style="font-size:13.5px;color:var(--gray-400);margin-bottom:16px">Pick up where you left off</p>
              <button class="btn-primary" onclick="window.location.href='video-lesson.html?courseId=${courseId}&lessonId=1'" style="width:100%;padding:12px">
                Resume Course
              </button>
            </div>
          ` : `
            <div class="info-card" style="margin-top:16px">
              <h3>Course Actions</h3>
              <div style="display:flex;flex-direction:column;gap:10px;margin-top:8px">
                <button class="btn-primary" style="width:100%;padding:12px" onclick="showToast('Edit mode can be the next step.','info')">Edit Course</button>
                <button class="btn-amber" style="width:100%;padding:12px" onclick="openModal('add-lesson-modal')">+ Add Lesson</button>
                <button class="btn-secondary" style="width:100%;padding:12px" onclick="window.location.href='exams.html'">Create Exam</button>
              </div>
            </div>
          `}
        </div>
      </div>
    `;
  }

  document.getElementById('add-lesson-form').addEventListener('submit', async (event) => {
    event.preventDefault();
    const titleIn = document.getElementById('lesson-title');
    const error = validateField(titleIn, 'required');
    setFieldError(titleIn, error);
    if (error) return;

    const btn = document.getElementById('add-lesson-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner" style="border-top-color:var(--navy)"></span>Adding...';

    await api.post(`/courses/${courseId}/lessons`, {
      title: titleIn.value.trim(),
      type: document.getElementById('lesson-type').value,
      duration: document.getElementById('lesson-duration').value,
      url: document.getElementById('lesson-url').value,
      description: document.getElementById('lesson-desc').value,
    });

    closeModal('add-lesson-modal');
    showToast('Lesson added successfully.', 'success');
    btn.disabled = false;
    btn.textContent = 'Add Lesson';
    event.target.reset();
    loadCourse();
  });

  loadCourse();
</script>
</body>
</html>
