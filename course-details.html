<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Course Details — EduPlatform</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div id="sidebar-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:99"></div>

<div class="app-shell">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar__logo">
      <div class="sidebar__logo-mark">🎓</div>
      <span class="sidebar__logo-name">EduPlatform</span>
    </div>
    <div class="sidebar__user">
      <div class="sidebar__avatar" id="sidebar-avatar">U</div>
      <div>
        <div class="sidebar__user-name" id="sidebar-user-name">Loading…</div>
        <div class="sidebar__user-role" id="sidebar-user-role">—</div>
      </div>
    </div>
    <nav class="sidebar__nav" id="sidebar-nav"></nav>
    <div class="sidebar__bottom">
      <button class="sidebar__logout" id="logout-btn">
        <span class="nav-icon">🚪</span> Sign Out
      </button>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <div class="main-content">
    <header class="topbar">
      <div class="topbar__left">
        <button class="menu-toggle" id="menu-toggle">☰</button>
        <div>
          <div class="topbar__title" id="page-title">Course Details</div>
          <div class="topbar__breadcrumb">
            <a href="dashboard.html">Home</a> ›
            <a href="courses.html">Courses</a> ›
            <span id="course-title-crumb">Loading…</span>
          </div>
        </div>
      </div>
      <div class="topbar__right">
        <div class="topbar-search">
          <span class="search-icon">🔍</span>
          <input type="text" placeholder="Search…" />
        </div>
        <div class="topbar-notif">🔔<span class="badge"></span></div>
        <div style="font-size:13px;font-weight:600;color:var(--navy)" id="topbar-user-name"></div>
      </div>
    </header>

    <main class="page-body" id="course-content">
      <!-- Spinner while loading -->
      <div style="display:flex;align-items:center;justify-content:center;min-height:50vh">
        <div style="width:40px;height:40px;border:3px solid #e2e8f0;border-top-color:#f59e0b;border-radius:50%;animation:spin 0.7s linear infinite"></div>
      </div>
    </main>
  </div>
</div>

<!-- Add Lesson Modal (Teacher) -->
<div class="modal-overlay" id="add-lesson-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Add New Lesson</div>
      <button class="modal-close" data-close-modal="add-lesson-modal">✕</button>
    </div>
    <form id="add-lesson-form" novalidate>
      <div class="form-group">
        <label>Lesson Title</label>
        <input type="text" id="lesson-title" placeholder="e.g. Variables and Data Types" />
        <div class="field-error"></div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Type</label>
          <select id="lesson-type">
            <option value="video">🎬 Video</option>
            <option value="article">📄 Article</option>
            <option value="quiz">❓ Quiz</option>
          </select>
        </div>
        <div class="form-group">
          <label>Duration</label>
          <input type="text" id="lesson-duration" placeholder="e.g. 14 min" />
        </div>
      </div>
      <div class="form-group">
        <label>Video URL (optional)</label>
        <input type="url" id="lesson-url" placeholder="https://…" />
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea id="lesson-desc" rows="3" placeholder="Brief description…" style="resize:vertical"></textarea>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn-secondary" data-close-modal="add-lesson-modal">Cancel</button>
        <button type="submit" class="btn-amber" id="add-lesson-btn">Add Lesson</button>
      </div>
    </form>
  </div>
</div>

<script src="js/main.js"></script>
<script>
  requireAuth();
  populateSidebarUser();

  const user      = getUser();
  const isTeacher = user?.role === 'teacher';
  const courseId  = getParam('id') || '1';

  /* ---- Sidebar nav ---- */
  const navItems = isTeacher
    ? [
        { icon:'🏠', label:'Dashboard', page:'dashboard.html' },
        { icon:'📚', label:'Courses',   page:'courses.html' },
        { icon:'📝', label:'Exams',     page:'exams.html' },
        { icon:'👥', label:'Students',  page:'#' },
        { icon:'⚙️', label:'Settings', page:'#' },
      ]
    : [
        { icon:'🏠', label:'Dashboard', page:'dashboard.html' },
        { icon:'📚', label:'Courses',   page:'courses.html' },
        { icon:'📝', label:'Exams',     page:'exams.html', badge:'2' },
        { icon:'🏆', label:'Achievements', page:'#' },
        { icon:'⚙️', label:'Settings', page:'#' },
      ];

  document.getElementById('sidebar-nav').innerHTML =
    '<div class="sidebar__nav-section">Main Menu</div>' +
    navItems.map(item => `
      <a href="${item.page}" class="nav-item" data-page="${item.page}">
        <span class="nav-icon">${item.icon}</span>
        <span>${item.label}</span>
        ${item.badge ? `<span class="nav-badge">${item.badge}</span>` : ''}
      </a>`).join('');

  /* ---- Demo data ---- */
  const DEMO_COURSE = {
    id: courseId, title: 'Python Fundamentals', category: 'Programming',
    emoji: '🐍', level: 'Beginner', duration: '6 weeks', rating: '4.9',
    studentsCount: 1240, lessonsCount: 12, progress: 75,
    instructorName: 'Ms. Sarah Ahmed',
    description: 'Master Python from scratch. This course covers all essentials including variables, control flow, functions, modules, file handling, and object-oriented programming. Perfect for absolute beginners.'
  };
  const DEMO_LESSONS = [
    { id:1,  title:'Introduction to Python',      type:'video',   duration:'12 min', completed:true,  locked:false },
    { id:2,  title:'Variables & Data Types',       type:'video',   duration:'18 min', completed:true,  locked:false },
    { id:3,  title:'Operators & Expressions',      type:'video',   duration:'14 min', completed:true,  locked:false },
    { id:4,  title:'Control Flow: if/else',        type:'video',   duration:'20 min', completed:false, locked:false, active:true },
    { id:5,  title:'Loops: for & while',           type:'video',   duration:'22 min', completed:false, locked:false },
    { id:6,  title:'Quiz: Basics Check',           type:'quiz',    duration:'10 min', completed:false, locked:false },
    { id:7,  title:'Functions & Scope',            type:'video',   duration:'25 min', completed:false, locked:true  },
    { id:8,  title:'Lists, Tuples & Dicts',        type:'video',   duration:'28 min', completed:false, locked:true  },
    { id:9,  title:'File I/O',                     type:'article', duration:'15 min', completed:false, locked:true  },
    { id:10, title:'Object-Oriented Programming',  type:'video',   duration:'35 min', completed:false, locked:true  },
    { id:11, title:'Modules & Packages',           type:'article', duration:'12 min', completed:false, locked:true  },
    { id:12, title:'Final Project',                type:'quiz',    duration:'45 min', completed:false, locked:true  },
  ];

  const LESSON_TYPE_ICONS = { video: '🎬', article: '📄', quiz: '❓' };

  async function loadCourse() {
    let course, lessons;
    try {
      [course, lessons] = await Promise.all([
        api.get(`/courses/${courseId}`),
        api.get(`/courses/${courseId}/lessons`),
      ]);
    } catch {
      course  = DEMO_COURSE;
      lessons = DEMO_LESSONS;
    }

    document.getElementById('course-title-crumb').textContent = course.title;
    document.title = `${course.title} — EduPlatform`;

    const completedCount = lessons.filter(l => l.completed).length;
    const progressPct    = Math.round((completedCount / lessons.length) * 100);

    const content = document.getElementById('course-content');
    content.innerHTML = `
      <!-- Hero -->
      <div class="course-hero">
        <div class="course-hero__icon">${course.emoji || '📚'}</div>
        <div class="course-hero__content">
          <div class="course-hero__category">${course.category}</div>
          <div class="course-hero__title">${course.title}</div>
          <div class="course-hero__desc">${course.description}</div>
          <div class="course-hero__tags">
            <span class="course-hero__tag">⭐ ${course.rating} rating</span>
            <span class="course-hero__tag">👥 ${course.studentsCount?.toLocaleString() || 0} students</span>
            <span class="course-hero__tag">⏱ ${course.duration}</span>
            <span class="course-hero__tag">📶 ${course.level}</span>
          </div>
        </div>
      </div>

      <!-- Details Grid -->
      <div class="course-details-grid">

        <!-- Lessons list -->
        <div>
          <div class="section-header">
            <div class="section-title">Course Lessons (${lessons.length})</div>
            ${isTeacher
              ? `<button class="btn-amber" onclick="openModal('add-lesson-modal')">+ Add Lesson</button>`
              : `<span style="font-size:13px;color:var(--gray-400)">${completedCount}/${lessons.length} completed</span>`}
          </div>

          ${!isTeacher ? `
            <div class="course-card__progress-bar" style="margin-bottom:20px;height:6px">
              <div class="course-card__progress-fill" style="width:${progressPct}%"></div>
            </div>` : ''}

          <div class="lessons-list">
            ${lessons.map((lesson, i) => `
              <div class="lesson-item ${lesson.completed ? 'completed' : ''} ${lesson.active ? 'active' : ''} ${lesson.locked ? 'locked' : ''}"
                   onclick="${lesson.locked ? '' : `window.location.href='video-lesson.html?courseId=${courseId}&lessonId=${lesson.id}'`}"
                   title="${lesson.locked ? 'Complete previous lessons to unlock' : ''}">
                <div class="lesson-num">${lesson.completed ? '✓' : lesson.locked ? '🔒' : i + 1}</div>
                <div class="lesson-info">
                  <div class="lesson-title">${lesson.title}</div>
                  <div class="lesson-meta">
                    <span>${LESSON_TYPE_ICONS[lesson.type] || '📄'} ${lesson.type}</span>
                    <span>⏱ ${lesson.duration}</span>
                  </div>
                </div>
                <div class="lesson-type">
                  ${lesson.completed
                    ? `<span class="badge badge-green">Done</span>`
                    : lesson.locked
                      ? `<span class="badge badge-gray">Locked</span>`
                      : `<span class="badge badge-amber">${lesson.active ? 'In Progress' : 'Start'}</span>`}
                </div>
              </div>`).join('')}
          </div>
        </div>

        <!-- Side info -->
        <div>
          <div class="info-card">
            <h3>Course Info</h3>
            <div class="info-row">
              <span class="info-row-label">Instructor</span>
              <span class="info-row-value">${course.instructorName}</span>
            </div>
            <div class="info-row">
              <span class="info-row-label">Level</span>
              <span class="info-row-value">${course.level}</span>
            </div>
            <div class="info-row">
              <span class="info-row-label">Duration</span>
              <span class="info-row-value">${course.duration}</span>
            </div>
            <div class="info-row">
              <span class="info-row-label">Lessons</span>
              <span class="info-row-value">${lessons.length}</span>
            </div>
            <div class="info-row">
              <span class="info-row-label">Rating</span>
              <span class="info-row-value">⭐ ${course.rating}</span>
            </div>
            <div class="info-row">
              <span class="info-row-label">Students</span>
              <span class="info-row-value">${(course.studentsCount || 0).toLocaleString()}</span>
            </div>
            ${!isTeacher ? `
            <div class="info-row">
              <span class="info-row-label">Your Progress</span>
              <span class="info-row-value" style="color:var(--amber-dark)">${progressPct}%</span>
            </div>` : ''}
          </div>

          ${!isTeacher ? `
          <div class="info-card" style="margin-top:16px">
            <h3>Continue Learning</h3>
            <p style="font-size:13.5px;color:var(--gray-400);margin-bottom:16px">Pick up where you left off</p>
            <button class="btn-primary" onclick="window.location.href='video-lesson.html?courseId=${courseId}&lessonId=4'" style="width:100%;padding:12px">
              ▶ Resume Course
            </button>
          </div>` : ''}

          ${isTeacher ? `
          <div class="info-card" style="margin-top:16px">
            <h3>Course Actions</h3>
            <div style="display:flex;flex-direction:column;gap:10px;margin-top:8px">
              <button class="btn-primary" style="width:100%;padding:12px" onclick="showToast('Edit mode coming soon','info')">✏️ Edit Course</button>
              <button class="btn-amber" style="width:100%;padding:12px" onclick="openModal('add-lesson-modal')">+ Add Lesson</button>
              <button class="btn-secondary" style="width:100%;padding:12px" onclick="showToast('Exam created!','success')">📝 Create Exam</button>
            </div>
          </div>` : ''}
        </div>
      </div>`;
  }

  /* ---- Add lesson form ---- */
  document.getElementById('add-lesson-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const titleIn = document.getElementById('lesson-title');
    const err = validateField(titleIn, 'required');
    setFieldError(titleIn, err);
    if (err) return;

    const btn = document.getElementById('add-lesson-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner" style="border-top-color:var(--navy)"></span>Adding…';

    try {
      await api.post(`/courses/${courseId}/lessons`, {
        title:    titleIn.value.trim(),
        type:     document.getElementById('lesson-type').value,
        duration: document.getElementById('lesson-duration').value,
        url:      document.getElementById('lesson-url').value,
      });
    } catch { /* demo */ }

    closeModal('add-lesson-modal');
    showToast('Lesson added! 🎉', 'success');
    btn.disabled = false;
    btn.textContent = 'Add Lesson';
    e.target.reset();
    loadCourse();
  });

  loadCourse();
</script>
</body>
</html>
