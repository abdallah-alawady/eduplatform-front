<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Courses - EduPlatform</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div id="sidebar-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:99"></div>

<div class="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar__logo">
      <div class="sidebar__logo-mark">&#127891;</div>
      <span class="sidebar__logo-name">EduPlatform</span>
    </div>
    <div class="sidebar__user">
      <div class="sidebar__avatar" id="sidebar-avatar">U</div>
      <div>
        <div class="sidebar__user-name" id="sidebar-user-name">Loading...</div>
        <div class="sidebar__user-role" id="sidebar-user-role">-</div>
      </div>
    </div>
    <nav class="sidebar__nav" id="sidebar-nav"></nav>
    <div class="sidebar__bottom">
      <button class="sidebar__logout" id="logout-btn">
        <span class="nav-icon">&#128682;</span> Sign Out
      </button>
    </div>
  </aside>

  <div class="main-content">
    <header class="topbar">
      <div class="topbar__left">
        <button class="menu-toggle" id="menu-toggle">&#9776;</button>
        <button class="sidebar-peek-toggle" id="sidebar-peek-toggle" title="Toggle sidebar">&#9776;</button>
        <div>
          <div class="topbar__title">Courses</div>
          <div class="topbar__breadcrumb"><a href="dashboard.html">Home</a> &rsaquo; Courses</div>
        </div>
      </div>
      <div class="topbar__right">
        <div class="topbar-search">
          <span class="search-icon">&#128269;</span>
          <input type="text" placeholder="Search courses..." id="global-search" />
        </div>
        <div style="font-size:13px;font-weight:600;color:var(--navy)" id="topbar-user-name"></div>
      </div>
    </header>

    <main class="page-body">
      <div class="page-header">
        <h1 id="courses-heading">All Courses</h1>
        <p id="courses-subheading">Explore and manage courses</p>
      </div>

      <div class="filter-bar">
        <input type="text" id="search-courses" placeholder="Search courses by title..." />
        <button class="filter-pill active" data-filter="all">All</button>
        <button class="filter-pill" data-filter="Programming">Programming</button>
        <button class="filter-pill" data-filter="Design">Design</button>
        <button class="filter-pill" data-filter="Mathematics">Mathematics</button>
        <button class="filter-pill" data-filter="Science">Science</button>
        <button class="filter-pill" data-filter="Language">Language</button>
        <div id="teacher-actions" style="margin-left:auto;display:none">
          <button class="btn-amber" onclick="openModal('create-course-modal')">+ New Course</button>
        </div>
      </div>

      <div class="cards-grid" id="courses-grid"></div>

      <div style="text-align:center;margin-top:32px" id="load-more-wrap">
        <button class="btn-secondary" id="load-more-btn" style="padding:12px 32px;font-size:15px">Load more courses</button>
      </div>
    </main>
  </div>
</div>

<div class="modal-overlay" id="create-course-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Create New Course</div>
      <button class="modal-close" data-close-modal="create-course-modal">&times;</button>
    </div>
    <form id="create-course-form" novalidate>
      <div class="form-group">
        <label>Course Title</label>
        <input type="text" id="course-title" placeholder="e.g. Introduction to Python" />
        <div class="field-error"></div>
      </div>
      <div class="form-group">
        <label>Category</label>
        <select id="course-category">
          <option value="">Select category</option>
          <option>Programming</option>
          <option>Design</option>
          <option>Mathematics</option>
          <option>Science</option>
          <option>Language</option>
          <option>Business</option>
        </select>
        <div class="field-error"></div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Level</label>
          <select id="course-level">
            <option value="">Level</option>
            <option>Beginner</option>
            <option>Intermediate</option>
            <option>Advanced</option>
          </select>
        </div>
        <div class="form-group">
          <label>Duration</label>
          <input type="text" id="course-duration" placeholder="e.g. 6 weeks" />
        </div>
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea id="course-desc" rows="3" placeholder="Course description..." style="resize:vertical"></textarea>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn-secondary" data-close-modal="create-course-modal">Cancel</button>
        <button type="submit" class="btn-amber" id="create-course-btn">Create Course</button>
      </div>
    </form>
  </div>
</div>

<script src="js/main.js"></script>
<script>
  requireAuth();
  populateSidebarUser();

  const user = getUser();
  const isTeacher = user?.role === 'teacher';
  if (!isTeacher) document.body.classList.add('student-shell');

  const teacherNav = [
    { icon: '&#127968;', label: 'Dashboard', page: 'dashboard.html' },
    { icon: '&#128218;', label: 'Courses', page: 'courses.html' },
    { icon: '&#128221;', label: 'Exams', page: 'exams.html' },
    { icon: '&#128101;', label: 'Students', page: 'dashboard.html?view=students' },
    { icon: '&#128202;', label: 'Analytics', page: 'dashboard.html?view=analytics' },
    { icon: '&#9881;', label: 'Settings', page: 'dashboard.html?view=settings' },
  ];
  const studentNav = [
    { icon: '&#127968;', label: 'Dashboard', page: 'dashboard.html' },
    { icon: '&#128218;', label: 'My Courses', page: 'courses.html' },
    { icon: '&#128221;', label: 'My Exams', page: 'exams.html', badge: '2' },
    { icon: '&#127942;', label: 'Progress', page: 'dashboard.html?view=progress' },
    { icon: '&#128197;', label: 'Schedule', page: 'dashboard.html?view=schedule' },
    { icon: '&#9881;', label: 'Settings', page: 'dashboard.html?view=settings' },
  ];

  document.getElementById('sidebar-nav').innerHTML =
    '<div class="sidebar__nav-section">Workspace</div>' +
    (isTeacher ? teacherNav : studentNav).map((item) => `
      <a href="${item.page}" class="nav-item" data-page="${item.page}">
        <span class="nav-icon">${item.icon}</span>
        <span>${item.label}</span>
        ${item.badge ? `<span class="nav-badge">${item.badge}</span>` : ''}
      </a>
    `).join('');

  document.querySelectorAll('#sidebar-nav .nav-item').forEach((item) => {
    if (item.getAttribute('href') === 'courses.html') item.classList.add('active');
  });

  document.getElementById('sidebar-peek-toggle')?.addEventListener('click', () => {
    if (isTeacher) return;
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebar-overlay');
    const open = sidebar.classList.toggle('open');
    overlay.style.display = open ? 'block' : 'none';
  });
  document.getElementById('sidebar-overlay')?.addEventListener('click', () => {
    if (isTeacher) return;
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebar-overlay').style.display = 'none';
  });

  if (isTeacher) {
    document.getElementById('courses-heading').textContent = 'My Courses';
    document.getElementById('courses-subheading').textContent = 'Manage and create your course library';
    document.getElementById('teacher-actions').style.display = 'flex';
  } else {
    document.getElementById('courses-heading').textContent = 'Browse Courses';
    document.getElementById('courses-subheading').textContent = 'Discover courses and track your progress';
  }

  let allCourses = [];
  let filteredCourses = [];
  let currentFilter = 'all';
  let searchQuery = '';
  let displayCount = 6;

  async function loadCourses() {
    showSkeletons('courses-grid', 6, 'card');
    allCourses = await api.get(isTeacher ? '/teacher/courses' : '/student/courses');
    applyFilters();
  }

  function applyFilters() {
    filteredCourses = allCourses.filter((course) => {
      const matchCategory = currentFilter === 'all' || course.category === currentFilter;
      const matchSearch = course.title.toLowerCase().includes(searchQuery.toLowerCase());
      return matchCategory && matchSearch;
    });
    renderGrid();
  }

  function renderGrid() {
    const grid = document.getElementById('courses-grid');
    const loadMoreWrap = document.getElementById('load-more-wrap');
    const visible = filteredCourses.slice(0, displayCount);

    if (!visible.length) {
      showEmpty('courses-grid', 'No courses match your search or filter.', '&#128269;');
      loadMoreWrap.style.display = 'none';
      return;
    }

    grid.innerHTML = visible.map(renderCourseCard).join('');
    loadMoreWrap.style.display = filteredCourses.length > displayCount ? 'block' : 'none';
  }

  document.querySelectorAll('.filter-pill').forEach((pill) => {
    pill.addEventListener('click', () => {
      document.querySelectorAll('.filter-pill').forEach((item) => item.classList.remove('active'));
      pill.classList.add('active');
      currentFilter = pill.dataset.filter;
      displayCount = 6;
      applyFilters();
    });
  });

  document.getElementById('search-courses').addEventListener('input', (event) => {
    searchQuery = event.target.value;
    displayCount = 6;
    applyFilters();
  });

  document.getElementById('load-more-btn').addEventListener('click', () => {
    displayCount += 6;
    renderGrid();
  });

  document.getElementById('create-course-form').addEventListener('submit', async (event) => {
    event.preventDefault();
    const titleIn = document.getElementById('course-title');
    const error = validateField(titleIn, 'required');
    setFieldError(titleIn, error);
    if (error) return;

    const btn = document.getElementById('create-course-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner" style="border-top-color:var(--navy)"></span>Creating...';

    await api.post('/courses', {
      title: titleIn.value.trim(),
      category: document.getElementById('course-category').value,
      level: document.getElementById('course-level').value,
      duration: document.getElementById('course-duration').value,
      description: document.getElementById('course-desc').value,
    });

    closeModal('create-course-modal');
    showToast('Course created successfully.', 'success');
    btn.disabled = false;
    btn.textContent = 'Create Course';
    event.target.reset();
    loadCourses();
  });

  loadCourses();
</script>
</body>
</html>
