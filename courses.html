<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Courses — EduPlatform</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div id="sidebar-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:99"></div>

<div class="app-shell">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar__logo">
      <div class="sidebar__logo-mark">🎓</div>
      <span class="sidebar__logo-name">EduPlatform</span>
    </div>
    <div class="sidebar__user">
      <div class="sidebar__avatar" id="sidebar-avatar">U</div>
      <div>
        <div class="sidebar__user-name" id="sidebar-user-name">Loading…</div>
        <div class="sidebar__user-role" id="sidebar-user-role">—</div>
      </div>
    </div>
    <nav class="sidebar__nav" id="sidebar-nav"></nav>
    <div class="sidebar__bottom">
      <button class="sidebar__logout" id="logout-btn">
        <span class="nav-icon">🚪</span> Sign Out
      </button>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <div class="main-content">
    <header class="topbar">
      <div class="topbar__left">
        <button class="menu-toggle" id="menu-toggle">☰</button>
        <div>
          <div class="topbar__title">Courses</div>
          <div class="topbar__breadcrumb"><a href="dashboard.html">Home</a> › Courses</div>
        </div>
      </div>
      <div class="topbar__right">
        <div class="topbar-search">
          <span class="search-icon">🔍</span>
          <input type="text" placeholder="Search courses…" id="global-search" />
        </div>
        <div class="topbar-notif">🔔<span class="badge"></span></div>
        <div style="font-size:13px;font-weight:600;color:var(--navy)" id="topbar-user-name"></div>
      </div>
    </header>

    <main class="page-body">
      <div class="page-header">
        <h1 id="courses-heading">All Courses</h1>
        <p id="courses-subheading">Explore and manage courses</p>
      </div>

      <!-- Filter / Search Bar -->
      <div class="filter-bar">
        <input type="text" id="search-courses" placeholder="🔍  Search courses by title…" />
        <button class="filter-pill active" data-filter="all">All</button>
        <button class="filter-pill" data-filter="Programming">Programming</button>
        <button class="filter-pill" data-filter="Design">Design</button>
        <button class="filter-pill" data-filter="Mathematics">Mathematics</button>
        <button class="filter-pill" data-filter="Science">Science</button>
        <button class="filter-pill" data-filter="Language">Language</button>
        <div id="teacher-actions" style="margin-left:auto;display:none">
          <button class="btn-amber" onclick="openModal('create-course-modal')">+ New Course</button>
        </div>
      </div>

      <!-- Courses Grid -->
      <div class="cards-grid" id="courses-grid">
        <!-- Skeleton loaders -->
      </div>

      <!-- Load More -->
      <div style="text-align:center;margin-top:32px" id="load-more-wrap">
        <button class="btn-secondary" id="load-more-btn" style="padding:12px 32px;font-size:15px">Load more courses</button>
      </div>

    </main>
  </div>
</div>

<!-- Create Course Modal (Teacher) -->
<div class="modal-overlay" id="create-course-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Create New Course</div>
      <button class="modal-close" data-close-modal="create-course-modal">✕</button>
    </div>
    <form id="create-course-form" novalidate>
      <div class="form-group">
        <label>Course Title</label>
        <input type="text" id="course-title" placeholder="e.g. Introduction to Python" />
        <div class="field-error"></div>
      </div>
      <div class="form-group">
        <label>Category</label>
        <select id="course-category">
          <option value="">Select category</option>
          <option>Programming</option><option>Design</option>
          <option>Mathematics</option><option>Science</option>
          <option>Language</option><option>Business</option>
        </select>
        <div class="field-error"></div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Level</label>
          <select id="course-level">
            <option value="">Level</option>
            <option>Beginner</option><option>Intermediate</option><option>Advanced</option>
          </select>
        </div>
        <div class="form-group">
          <label>Duration</label>
          <input type="text" id="course-duration" placeholder="e.g. 6 weeks" />
        </div>
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea id="course-desc" rows="3" placeholder="Course description…" style="resize:vertical"></textarea>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn-secondary" data-close-modal="create-course-modal">Cancel</button>
        <button type="submit" class="btn-amber" id="create-course-btn">Create Course</button>
      </div>
    </form>
  </div>
</div>

<script src="js/main.js"></script>
<script>
  requireAuth();
  populateSidebarUser();

  const user      = getUser();
  const isTeacher = user?.role === 'teacher';

  /* ---- Sidebar nav ---- */
  const navItems = isTeacher
    ? [
        { icon:'🏠', label:'Dashboard',  page:'dashboard.html' },
        { icon:'📚', label:'My Courses', page:'courses.html' },
        { icon:'📝', label:'Exams',      page:'exams.html' },
        { icon:'👥', label:'Students',   page:'#', badge:'24' },
        { icon:'📊', label:'Analytics',  page:'#' },
        { icon:'⚙️', label:'Settings',  page:'#' },
      ]
    : [
        { icon:'🏠', label:'Dashboard',     page:'dashboard.html' },
        { icon:'📚', label:'My Courses',    page:'courses.html' },
        { icon:'📝', label:'Exams',         page:'exams.html', badge:'2' },
        { icon:'🏆', label:'Achievements',  page:'#' },
        { icon:'📅', label:'Schedule',      page:'#' },
        { icon:'⚙️', label:'Settings',     page:'#' },
      ];

  document.getElementById('sidebar-nav').innerHTML =
    '<div class="sidebar__nav-section">Main Menu</div>' +
    navItems.map(item => `
      <a href="${item.page}" class="nav-item" data-page="${item.page}">
        <span class="nav-icon">${item.icon}</span>
        <span>${item.label}</span>
        ${item.badge ? `<span class="nav-badge">${item.badge}</span>` : ''}
      </a>`).join('');

  setActiveNav();

  if (isTeacher) {
    document.getElementById('courses-heading').textContent   = 'My Courses';
    document.getElementById('courses-subheading').textContent = 'Manage and create your course library';
    document.getElementById('teacher-actions').style.display  = 'flex';
  } else {
    document.getElementById('courses-heading').textContent    = 'Browse Courses';
    document.getElementById('courses-subheading').textContent = 'Discover courses and track your progress';
  }

  /* ---- Demo course data ---- */
  const DEMO_COURSES = [
    { id:1,  title:'Python Fundamentals',        category:'Programming', emoji:'🐍', lessonsCount:12, duration:'6 weeks',  rating:'4.9', instructorName:'Ms. Sarah', level:'Beginner',     progress: isTeacher?0:75, isNew:true  },
    { id:2,  title:'Data Structures & Algorithms',category:'Programming', emoji:'🌳', lessonsCount:18, duration:'8 weeks',  rating:'4.7', instructorName:'Dr. Mona',  level:'Intermediate', progress: isTeacher?0:20            },
    { id:3,  title:'UI/UX Design Fundamentals',   category:'Design',      emoji:'🎨', lessonsCount:10, duration:'4 weeks',  rating:'4.8', instructorName:'Mr. Karim', level:'Beginner',     progress: isTeacher?0:40            },
    { id:4,  title:'Statistics & Probability',    category:'Mathematics', emoji:'📊', lessonsCount:14, duration:'5 weeks',  rating:'4.6', instructorName:'Dr. Lina',  level:'Intermediate', progress: isTeacher?0:0             },
    { id:5,  title:'Machine Learning Basics',     category:'Science',     emoji:'🤖', lessonsCount:16, duration:'10 weeks', rating:'4.9', instructorName:'Ms. Sarah', level:'Advanced',     progress: isTeacher?0:0, isNew:true  },
    { id:6,  title:'English for Professionals',   category:'Language',    emoji:'💬', lessonsCount:20, duration:'8 weeks',  rating:'4.5', instructorName:'Mr. Nabil', level:'Beginner',     progress: isTeacher?0:0             },
    { id:7,  title:'Digital Photography',         category:'Design',      emoji:'📷', lessonsCount:8,  duration:'3 weeks',  rating:'4.4', instructorName:'Ms. Dina',  level:'Beginner',     progress: isTeacher?0:0             },
    { id:8,  title:'Calculus I',                  category:'Mathematics', emoji:'∫',  lessonsCount:22, duration:'12 weeks', rating:'4.3', instructorName:'Dr. Mona',  level:'Intermediate', progress: isTeacher?0:0             },
  ];

  let allCourses    = [];
  let filteredCourses = [];
  let currentFilter   = 'all';
  let searchQuery     = '';
  let displayCount    = 6;

  /* ---- Fetch courses ---- */
  async function loadCourses() {
    showSkeletons('courses-grid', 6, 'card');
    try {
      allCourses = await api.get(isTeacher ? '/teacher/courses' : '/student/courses');
    } catch {
      allCourses = DEMO_COURSES;
    }
    applyFilters();
  }

  function applyFilters() {
    filteredCourses = allCourses.filter(c => {
      const matchCat  = currentFilter === 'all' || c.category === currentFilter;
      const matchSearch = c.title.toLowerCase().includes(searchQuery.toLowerCase());
      return matchCat && matchSearch;
    });
    renderGrid();
  }

  function renderGrid() {
    const grid   = document.getElementById('courses-grid');
    const lmWrap = document.getElementById('load-more-wrap');
    const visible = filteredCourses.slice(0, displayCount);

    if (!visible.length) {
      showEmpty('courses-grid', 'No courses match your search or filter.', '🔍');
      lmWrap.style.display = 'none';
      return;
    }

    grid.innerHTML = visible.map(renderCourseCard).join('');
    lmWrap.style.display = filteredCourses.length > displayCount ? 'block' : 'none';
  }

  /* ---- Filter pills ---- */
  document.querySelectorAll('.filter-pill').forEach(pill => {
    pill.addEventListener('click', () => {
      document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      currentFilter = pill.dataset.filter;
      displayCount  = 6;
      applyFilters();
    });
  });

  /* ---- Search ---- */
  document.getElementById('search-courses').addEventListener('input', (e) => {
    searchQuery  = e.target.value;
    displayCount = 6;
    applyFilters();
  });

  /* ---- Load more ---- */
  document.getElementById('load-more-btn').addEventListener('click', () => {
    displayCount += 6;
    renderGrid();
  });

  /* ---- Create course form ---- */
  document.getElementById('create-course-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const titleIn = document.getElementById('course-title');
    const err = validateField(titleIn, 'required');
    setFieldError(titleIn, err);
    if (err) return;

    const btn = document.getElementById('create-course-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner" style="border-top-color:var(--navy)"></span>Creating…';

    try { await api.post('/courses', { title: titleIn.value.trim(), category: document.getElementById('course-category').value }); }
    catch { /* demo */ }

    closeModal('create-course-modal');
    showToast('Course created! 🎉', 'success');
    btn.disabled = false;
    btn.textContent = 'Create Course';
    e.target.reset();
    loadCourses();
  });

  loadCourses();
</script>
</body>
</html>
