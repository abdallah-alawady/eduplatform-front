<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Take Exam — EduPlatform</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div id="sidebar-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:99"></div>

<div class="app-shell">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar__logo">
      <div class="sidebar__logo-mark">🎓</div>
      <span class="sidebar__logo-name">EduPlatform</span>
    </div>
    <div class="sidebar__user">
      <div class="sidebar__avatar" id="sidebar-avatar">U</div>
      <div>
        <div class="sidebar__user-name" id="sidebar-user-name">Loading…</div>
        <div class="sidebar__user-role" id="sidebar-user-role">—</div>
      </div>
    </div>
    <nav class="sidebar__nav" id="sidebar-nav"></nav>
    <div class="sidebar__bottom">
      <button class="sidebar__logout" id="logout-btn">
        <span class="nav-icon">🚪</span> Sign Out
      </button>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <div class="main-content">
    <header class="topbar">
      <div class="topbar__left">
        <button class="menu-toggle" id="menu-toggle">☰</button>
        <div>
          <div class="topbar__title" id="exam-title-bar">Take Exam</div>
          <div class="topbar__breadcrumb">
            <a href="dashboard.html">Home</a> ›
            <a href="exams.html">Exams</a> ›
            <span id="exam-crumb">Exam</span>
          </div>
        </div>
      </div>
      <div class="topbar__right">
        <div class="topbar-notif">🔔<span class="badge"></span></div>
        <div style="font-size:13px;font-weight:600;color:var(--navy)" id="topbar-user-name"></div>
      </div>
    </header>

    <main class="page-body" id="exam-content">
      <div style="display:flex;align-items:center;justify-content:center;min-height:50vh">
        <div style="width:40px;height:40px;border:3px solid #e2e8f0;border-top-color:#f59e0b;border-radius:50%;animation:spin 0.7s linear infinite"></div>
      </div>
    </main>
  </div>
</div>

<!-- Confirm Submit Modal -->
<div class="modal-overlay" id="submit-confirm-modal">
  <div class="modal" style="max-width:400px">
    <div class="modal-header">
      <div class="modal-title">Submit Exam?</div>
      <button class="modal-close" data-close-modal="submit-confirm-modal">✕</button>
    </div>
    <p style="font-size:14.5px;color:var(--gray-600);line-height:1.6" id="submit-confirm-msg">
      Are you sure you want to submit? You cannot change your answers after submitting.
    </p>
    <div class="modal-footer">
      <button type="button" class="btn-secondary" data-close-modal="submit-confirm-modal">Go Back</button>
      <button type="button" class="btn-primary" id="confirm-submit-btn">Submit Now</button>
    </div>
  </div>
</div>

<script src="js/main.js"></script>
<script>
  requireAuth();
  populateSidebarUser();

  const user      = getUser();
  const examId    = getParam('id')      || '2';
  const isPreview = getParam('preview') === 'true';

  /* ---- Sidebar ---- */
  document.getElementById('sidebar-nav').innerHTML =
    '<div class="sidebar__nav-section">Main Menu</div>' +
    [
      { icon:'🏠', label:'Dashboard', page:'dashboard.html' },
      { icon:'📚', label:'Courses',   page:'courses.html' },
      { icon:'📝', label:'Exams',     page:'exams.html' },
      { icon:'⚙️', label:'Settings', page:'#' },
    ].map(item => `
      <a href="${item.page}" class="nav-item" data-page="${item.page}">
        <span class="nav-icon">${item.icon}</span><span>${item.label}</span>
      </a>`).join('');

  /* ---- Demo exam data ---- */
  const DEMO_EXAM = {
    id: examId,
    title: 'Python Midterm Exam',
    courseName: 'Python Fundamentals',
    duration: 30,       // minutes
    instructions: 'Read each question carefully. You have 30 minutes to complete this exam. Each question is worth 5 points.',
    questions: [
      {
        id: 1,
        text: 'Which of the following is the correct way to declare a variable in Python?',
        options: ['int x = 5', 'x = 5', 'var x = 5', 'declare x = 5'],
        correct: 1,
      },
      {
        id: 2,
        text: 'What is the output of print(type(3.14)) in Python?',
        options: ["<class 'int'>", "<class 'str'>", "<class 'float'>", "<class 'double'>"],
        correct: 2,
      },
      {
        id: 3,
        text: 'Which keyword is used to define a function in Python?',
        options: ['function', 'def', 'func', 'define'],
        correct: 1,
      },
      {
        id: 4,
        text: 'What does the len() function return for the string "Hello"?',
        options: ['4', '5', '6', 'None'],
        correct: 1,
      },
      {
        id: 5,
        text: 'Which of the following is a mutable data type in Python?',
        options: ['tuple', 'string', 'list', 'int'],
        correct: 2,
      },
      {
        id: 6,
        text: 'What is the correct syntax for a for loop in Python?',
        options: ['for i in range(10):', 'for (i=0; i<10; i++)', 'for i = 0 to 10:', 'foreach i in range(10)'],
        correct: 0,
      },
      {
        id: 7,
        text: 'Which operator is used for floor division in Python?',
        options: ['/', '//', '%', '**'],
        correct: 1,
      },
      {
        id: 8,
        text: 'How do you add an element to the end of a list in Python?',
        options: ['list.add()', 'list.push()', 'list.append()', 'list.insert()'],
        correct: 2,
      },
    ],
  };

  /* ---- Exam state ---- */
  let exam       = null;
  let answers    = {};     // { questionIndex: optionIndex }
  let currentQ   = 0;
  let timerSecs  = 0;
  let timerInterval = null;
  let submitted  = false;

  async function loadExam() {
    try {
      exam = await api.get(`/exams/${examId}`);
    } catch {
      exam = DEMO_EXAM;
    }

    timerSecs = exam.duration * 60;
    document.getElementById('exam-title-bar').textContent = exam.title;
    document.getElementById('exam-crumb').textContent     = exam.title;
    document.title = `${exam.title} — EduPlatform`;

    renderExamStart();
  }

  /* ---- Start screen ---- */
  function renderExamStart() {
    document.getElementById('exam-content').innerHTML = `
      <div class="exam-layout">
        <div style="background:var(--white);border-radius:var(--radius);padding:48px;text-align:center;box-shadow:var(--shadow-lg);border:1px solid var(--gray-200);max-width:560px;margin:0 auto">
          <div style="font-size:56px;margin-bottom:20px">📝</div>
          <h2 style="font-family:var(--font-head);font-size:26px;color:var(--navy);margin-bottom:8px">${exam.title}</h2>
          <p style="font-size:13.5px;color:var(--amber-dark);font-weight:500;margin-bottom:20px">${exam.courseName}</p>

          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px">
            <div style="padding:16px;background:var(--gray-50);border-radius:var(--radius-sm);border:1px solid var(--gray-200)">
              <div style="font-size:22px;font-family:var(--font-head);color:var(--navy)">${exam.questions.length}</div>
              <div style="font-size:12px;color:var(--gray-400);margin-top:4px">Questions</div>
            </div>
            <div style="padding:16px;background:var(--gray-50);border-radius:var(--radius-sm);border:1px solid var(--gray-200)">
              <div style="font-size:22px;font-family:var(--font-head);color:var(--navy)">${exam.duration}</div>
              <div style="font-size:12px;color:var(--gray-400);margin-top:4px">Minutes</div>
            </div>
            <div style="padding:16px;background:var(--gray-50);border-radius:var(--radius-sm);border:1px solid var(--gray-200)">
              <div style="font-size:22px;font-family:var(--font-head);color:var(--navy)">70%</div>
              <div style="font-size:12px;color:var(--gray-400);margin-top:4px">Pass Mark</div>
            </div>
          </div>

          ${exam.instructions ? `
          <div style="background:var(--amber-glow);border:1px solid rgba(245,158,11,0.2);border-radius:var(--radius-sm);padding:16px 20px;text-align:left;margin-bottom:28px">
            <div style="font-size:12px;font-weight:700;color:var(--amber-dark);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px">📋 Instructions</div>
            <p style="font-size:13.5px;color:var(--gray-800);line-height:1.7">${exam.instructions}</p>
          </div>` : ''}

          <button class="btn-primary" id="start-exam-btn" style="padding:14px 48px;font-size:16px;width:auto;display:inline-block">
            Start Exam ▶
          </button>
          <br>
          <a href="exams.html" style="font-size:13px;color:var(--gray-400);margin-top:14px;display:inline-block">← Back to exams</a>
        </div>
      </div>`;

    document.getElementById('start-exam-btn').addEventListener('click', startExam);
  }

  /* ---- Start exam ---- */
  function startExam() {
    startTimer();
    renderQuestion(0);
  }

  /* ---- Timer ---- */
  function startTimer() {
    timerInterval = setInterval(() => {
      timerSecs--;
      updateTimerDisplay();
      if (timerSecs <= 0) {
        clearInterval(timerInterval);
        showToast('Time is up! Submitting your exam…', 'error');
        setTimeout(() => submitExam(true), 1000);
      }
      // Warning at 5 minutes
      if (timerSecs === 300) showToast('⏰ 5 minutes remaining!', 'info');
    }, 1000);
  }

  function updateTimerDisplay() {
    const el = document.getElementById('timer-display');
    if (!el) return;
    const m = Math.floor(timerSecs / 60).toString().padStart(2, '0');
    const s = (timerSecs % 60).toString().padStart(2, '0');
    el.textContent = `${m}:${s}`;
    el.style.color = timerSecs < 120 ? '#ef4444' : 'var(--amber)';
  }

  /* ---- Render question ---- */
  function renderQuestion(index) {
    currentQ = index;
    const q         = exam.questions[index];
    const answered  = Object.keys(answers).length;
    const progressPct = Math.round((answered / exam.questions.length) * 100);

    document.getElementById('exam-content').innerHTML = `
      <div class="exam-layout">

        <!-- Header with timer -->
        <div class="exam-header-card">
          <div class="exam-header-card__info">
            <div class="exam-header-card__title">${exam.title}</div>
            <div class="exam-header-card__sub">
              Question ${index + 1} of ${exam.questions.length} · ${answered} answered
            </div>
          </div>
          <div class="exam-timer">
            <div class="exam-timer__time" id="timer-display">--:--</div>
            <div class="exam-timer__label">Time Left</div>
          </div>
        </div>

        <!-- Progress -->
        <div class="exam-progress-bar">
          <div class="exam-progress-fill" style="width:${progressPct}%"></div>
        </div>

        <!-- Question Card -->
        <div class="question-card">
          <div class="question-num">Question ${index + 1} of ${exam.questions.length}</div>
          <div class="question-text">${q.text}</div>

          <div class="options-list">
            ${q.options.map((opt, i) => `
              <label class="option-label" id="option-${i}">
                <input type="radio" name="question-${q.id}" value="${i}"
                  ${answers[index] === i ? 'checked' : ''}
                  onchange="selectAnswer(${index}, ${i})" />
                <div class="option-radio">
                  <div style="width:8px;height:8px;border-radius:50%;background:var(--amber);opacity:${answers[index] === i ? 1 : 0};transition:opacity 0.2s"></div>
                </div>
                <span class="option-text">${opt}</span>
              </label>`).join('')}
          </div>
        </div>

        <!-- Navigation & dots -->
        <div class="exam-nav">
          <button class="btn-secondary" id="prev-btn"
            ${index === 0 ? 'disabled style="opacity:0.4"' : ''}
            onclick="renderQuestion(${index - 1})">← Previous</button>

          <div class="question-dots">
            ${exam.questions.map((_, i) => `
              <div class="q-dot ${i === index ? 'active' : ''} ${answers[i] !== undefined ? 'answered' : ''}"
                   onclick="renderQuestion(${i})" title="Question ${i+1}"></div>`).join('')}
          </div>

          ${index < exam.questions.length - 1
            ? `<button class="btn-primary" onclick="renderQuestion(${index + 1})">Next →</button>`
            : `<button class="btn-amber" onclick="confirmSubmit()">Submit Exam ✓</button>`}
        </div>

      </div>`;

    updateTimerDisplay();
  }

  /* ---- Select answer ---- */
  function selectAnswer(qIndex, optIndex) {
    answers[qIndex] = optIndex;
    // Visually update dots
    const dots = document.querySelectorAll('.q-dot');
    if (dots[qIndex]) dots[qIndex].classList.add('answered');
  }

  /* ---- Confirm before submit ---- */
  function confirmSubmit() {
    const unanswered = exam.questions.length - Object.keys(answers).length;
    const msg = unanswered > 0
      ? `You have ${unanswered} unanswered question${unanswered>1?'s':''}. You cannot change your answers after submitting.`
      : 'You have answered all questions. Ready to submit?';
    document.getElementById('submit-confirm-msg').textContent = msg;
    openModal('submit-confirm-modal');

    document.getElementById('confirm-submit-btn').onclick = () => {
      closeModal('submit-confirm-modal');
      submitExam(false);
    };
  }

  /* ---- Submit exam ---- */
  async function submitExam(autoSubmit = false) {
    if (submitted) return;
    submitted = true;
    clearInterval(timerInterval);

    // Build payload
    const payload = {
      examId,
      answers: exam.questions.map((q, i) => ({
        questionId: q.id,
        selectedOption: answers[i] ?? null,
      })),
    };

    let result;
    try {
      result = await api.post(`/exams/${examId}/submit`, payload);
    } catch {
      // Demo: calculate score locally
      let correct = 0;
      exam.questions.forEach((q, i) => {
        if (answers[i] === q.correct) correct++;
      });
      const score = Math.round((correct / exam.questions.length) * 100);
      result = {
        score,
        correct,
        total: exam.questions.length,
        passed: score >= 70,
        answers: exam.questions.map((q, i) => ({
          questionId: q.id,
          correct: answers[i] === q.correct,
          correctOption: q.correct,
          selectedOption: answers[i] ?? null,
        })),
      };
    }

    renderResults(result);
  }

  /* ---- Render results ---- */
  function renderResults(result) {
    const pct = result.score;
    const passed = result.passed || pct >= 70;

    document.getElementById('exam-content').innerHTML = `
      <div class="exam-layout">
        <div class="result-card">
          <div class="result-score-circle" style="--pct:${pct * 3.6}deg">
            <div class="result-score-num">${pct}%</div>
          </div>

          <div class="result-title">${passed ? '🎉 Congratulations!' : '😔 Better Luck Next Time'}</div>
          <div class="result-sub">
            ${passed
              ? `You passed the exam with ${pct}% — excellent work!`
              : `You scored ${pct}%. The passing mark is 70%.`}
          </div>

          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:28px">
            <div style="padding:14px;background:var(--gray-50);border-radius:var(--radius-sm)">
              <div style="font-family:var(--font-head);font-size:22px;color:var(--green)">${result.correct}</div>
              <div style="font-size:12px;color:var(--gray-400)">Correct</div>
            </div>
            <div style="padding:14px;background:var(--gray-50);border-radius:var(--radius-sm)">
              <div style="font-family:var(--font-head);font-size:22px;color:var(--red)">${result.total - result.correct}</div>
              <div style="font-size:12px;color:var(--gray-400)">Incorrect</div>
            </div>
            <div style="padding:14px;background:var(--gray-50);border-radius:var(--radius-sm)">
              <div style="font-family:var(--font-head);font-size:22px;color:var(--navy)">${result.total}</div>
              <div style="font-size:12px;color:var(--gray-400)">Total</div>
            </div>
          </div>

          <!-- Review answers -->
          <div style="text-align:left;border-top:1px solid var(--gray-200);padding-top:24px;margin-bottom:24px">
            <div style="font-family:var(--font-head);font-size:17px;color:var(--navy);margin-bottom:16px">Answer Review</div>
            ${exam.questions.map((q, i) => {
              const res    = result.answers?.find(a => a.questionId === q.id);
              const isRight = res ? res.correct : answers[i] === q.correct;
              const selected = res ? res.selectedOption : answers[i];
              return `
                <div style="margin-bottom:14px;padding:14px;border-radius:var(--radius-sm);border:1px solid ${isRight ? '#bbf7d0' : '#fecaca'};background:${isRight ? '#f0fdf4' : '#fef2f2'}">
                  <div style="font-size:13px;font-weight:600;color:${isRight ? 'var(--green)' : 'var(--red)'};margin-bottom:6px">
                    ${isRight ? '✓' : '✗'} Q${i+1}: ${q.text}
                  </div>
                  <div style="font-size:12.5px;color:var(--gray-600)">
                    Your answer: <strong>${selected != null ? q.options[selected] : 'Not answered'}</strong>
                    ${!isRight ? ` · Correct: <strong style="color:var(--green)">${q.options[q.correct]}</strong>` : ''}
                  </div>
                </div>`;
            }).join('')}
          </div>

          <div style="display:flex;gap:12px;justify-content:center">
            <button class="btn-secondary" onclick="window.location.href='exams.html'" style="padding:12px 24px">
              ← Back to Exams
            </button>
            <button class="btn-primary" onclick="window.location.href='dashboard.html'" style="padding:12px 24px">
              Go to Dashboard
            </button>
          </div>
        </div>
      </div>`;
  }

  /* ---- Init ---- */
  loadExam();
</script>
</body>
</html>
