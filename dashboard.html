<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — EduPlatform</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- ===== MOBILE SIDEBAR OVERLAY ===== -->
<div id="sidebar-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:99"></div>

<!-- ===== APP SHELL ===== -->
<div class="app-shell">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar__logo">
      <div class="sidebar__logo-mark">🎓</div>
      <span class="sidebar__logo-name">EduPlatform</span>
    </div>

    <div class="sidebar__user">
      <div class="sidebar__avatar" id="sidebar-avatar">U</div>
      <div>
        <div class="sidebar__user-name" id="sidebar-user-name">Loading…</div>
        <div class="sidebar__user-role" id="sidebar-user-role">—</div>
      </div>
    </div>

    <nav class="sidebar__nav" id="sidebar-nav">
      <!-- Populated by JS based on role -->
    </nav>

    <div class="sidebar__bottom">
      <button class="sidebar__logout" id="logout-btn">
        <span class="nav-icon">🚪</span> Sign Out
      </button>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <div class="main-content">

    <!-- TOPBAR -->
    <header class="topbar">
      <div class="topbar__left">
        <button class="menu-toggle" id="menu-toggle">☰</button>
        <div>
          <div class="topbar__title" id="page-title">Dashboard</div>
          <div class="topbar__breadcrumb">Home › <span id="page-title-crumb">Overview</span></div>
        </div>
      </div>
      <div class="topbar__right">
        <div class="topbar-search">
          <span class="search-icon">🔍</span>
          <input type="text" placeholder="Search courses, exams…" id="global-search" />
        </div>
        <div class="topbar-notif" title="Notifications">
          🔔
          <span class="badge"></span>
        </div>
        <div style="font-size:13px;font-weight:600;color:var(--navy)" id="topbar-user-name"></div>
      </div>
    </header>

    <!-- PAGE BODY -->
    <main class="page-body" id="dashboard-content">
      <!-- Populated by JS -->
      <div style="display:flex;align-items:center;justify-content:center;min-height:60vh">
        <div style="width:40px;height:40px;border:3px solid #e2e8f0;border-top-color:#f59e0b;border-radius:50%;animation:spin 0.7s linear infinite"></div>
      </div>
    </main>

  </div><!-- end main-content -->
</div><!-- end app-shell -->

<!-- ===== CREATE COURSE MODAL (Teacher only) ===== -->
<div class="modal-overlay" id="create-course-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Create New Course</div>
      <button class="modal-close" data-close-modal="create-course-modal">✕</button>
    </div>
    <form id="create-course-form" novalidate>
      <div class="form-group">
        <label>Course Title</label>
        <input type="text" id="course-title" placeholder="e.g. Introduction to Python" />
        <div class="field-error"></div>
      </div>
      <div class="form-group">
        <label>Category</label>
        <select id="course-category">
          <option value="">Select category</option>
          <option>Programming</option>
          <option>Design</option>
          <option>Mathematics</option>
          <option>Science</option>
          <option>Language</option>
          <option>Business</option>
        </select>
        <div class="field-error"></div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Level</label>
          <select id="course-level">
            <option value="">Level</option>
            <option>Beginner</option>
            <option>Intermediate</option>
            <option>Advanced</option>
          </select>
        </div>
        <div class="form-group">
          <label>Duration</label>
          <input type="text" id="course-duration" placeholder="e.g. 6 weeks" />
        </div>
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea id="course-desc" rows="3" placeholder="What will students learn?" style="resize:vertical"></textarea>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn-secondary" data-close-modal="create-course-modal">Cancel</button>
        <button type="submit" class="btn-amber" id="create-course-btn">Create Course</button>
      </div>
    </form>
  </div>
</div>

<script src="js/main.js"></script>
<script>
  /* ---- Auth guard ---- */
  requireAuth();
  populateSidebarUser();

  const user  = getUser();
  const role  = user?.role || 'student';
  const isTeacher = role === 'teacher';

  /* ---- Build sidebar nav based on role ---- */
  const teacherNav = [
    { icon: '🏠', label: 'Dashboard',   page: 'dashboard.html' },
    { icon: '📚', label: 'My Courses',  page: 'courses.html' },
    { icon: '📝', label: 'Exams',       page: 'exams.html' },
    { icon: '👥', label: 'Students',    page: '#', badge: '24' },
    { icon: '📊', label: 'Analytics',   page: '#' },
    { icon: '⚙️', label: 'Settings',   page: '#' },
  ];
  const studentNav = [
    { icon: '🏠', label: 'Dashboard',   page: 'dashboard.html' },
    { icon: '📚', label: 'My Courses',  page: 'courses.html' },
    { icon: '📝', label: 'Exams',       page: 'exams.html', badge: '2' },
    { icon: '🏆', label: 'Achievements',page: '#' },
    { icon: '📅', label: 'Schedule',    page: '#' },
    { icon: '⚙️', label: 'Settings',   page: '#' },
  ];

  const navItems = isTeacher ? teacherNav : studentNav;
  const navEl    = document.getElementById('sidebar-nav');
  navEl.innerHTML = `<div class="sidebar__nav-section">Main Menu</div>` +
    navItems.map(item => `
      <a href="${item.page}" class="nav-item" data-page="${item.page}">
        <span class="nav-icon">${item.icon}</span>
        <span>${item.label}</span>
        ${item.badge ? `<span class="nav-badge">${item.badge}</span>` : ''}
      </a>`).join('');

  setActiveNav();

  /* ---- Load dashboard data ---- */
  async function loadDashboard() {
    if (isTeacher) {
      await loadTeacherDashboard();
    } else {
      await loadStudentDashboard();
    }
  }

  /* ====== TEACHER DASHBOARD ====== */
  async function loadTeacherDashboard() {
    document.getElementById('page-title').textContent      = 'Teacher Dashboard';
    document.getElementById('page-title-crumb').textContent = 'Overview';

    let stats, courses, students;

    // Parallel API calls
    try {
      [stats, courses] = await Promise.all([
        api.get('/teacher/stats'),
        api.get('/teacher/courses?limit=6'),
      ]);
    } catch {
      /* Demo data fallback */
      stats = { totalStudents: 142, activeCourses: 8, totalLessons: 64, avgRating: 4.8 };
      courses = [
        { id:1, title:'Python Fundamentals',    category:'Programming', emoji:'🐍', lessonsCount:12, duration:'6 weeks', rating:'4.9', instructorName:'You', level:'Beginner',     progress:0, isNew:true  },
        { id:2, title:'Data Structures & Algo',  category:'Programming', emoji:'🌳', lessonsCount:18, duration:'8 weeks', rating:'4.7', instructorName:'You', level:'Intermediate', progress:0            },
        { id:3, title:'UI/UX Design Basics',     category:'Design',      emoji:'🎨', lessonsCount:10, duration:'4 weeks', rating:'4.8', instructorName:'You', level:'Beginner',     progress:0            },
        { id:4, title:'Statistics & Probability',category:'Mathematics', emoji:'📊', lessonsCount:14, duration:'5 weeks', rating:'4.6', instructorName:'You', level:'Intermediate', progress:0            },
      ];
    }

    const content = document.getElementById('dashboard-content');
    content.innerHTML = `
      <!-- Stats Row -->
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-card__icon">👥</div>
          <div class="stat-card__num">${stats.totalStudents}</div>
          <div class="stat-card__label">Total Students</div>
          <div class="stat-card__change up">↑ 12 this week</div>
        </div>
        <div class="stat-card">
          <div class="stat-card__icon">📚</div>
          <div class="stat-card__num">${stats.activeCourses}</div>
          <div class="stat-card__label">Active Courses</div>
          <div class="stat-card__change up">↑ 2 this month</div>
        </div>
        <div class="stat-card">
          <div class="stat-card__icon">🎬</div>
          <div class="stat-card__num">${stats.totalLessons}</div>
          <div class="stat-card__label">Total Lessons</div>
          <div class="stat-card__change up">↑ 8 new lessons</div>
        </div>
        <div class="stat-card">
          <div class="stat-card__icon">⭐</div>
          <div class="stat-card__num">${stats.avgRating}</div>
          <div class="stat-card__label">Avg. Rating</div>
          <div class="stat-card__change up">↑ 0.2 this month</div>
        </div>
      </div>

      <!-- My Courses -->
      <div class="section-header">
        <div class="section-title">My Courses</div>
        <div style="display:flex;gap:10px;align-items:center">
          <a href="courses.html" class="section-link">View all →</a>
          <button class="btn-amber" onclick="openModal('create-course-modal')">+ New Course</button>
        </div>
      </div>
      <div class="cards-grid" id="teacher-courses">
        ${courses.map(renderCourseCard).join('')}
      </div>

      <!-- Recent Students Table -->
      <div class="section-header" style="margin-top:40px">
        <div class="section-title">Recent Enrollments</div>
        <a href="#" class="section-link">View all →</a>
      </div>
      <div class="table-wrap" id="students-table-wrap">
        <div style="display:flex;align-items:center;justify-content:center;padding:32px">
          <div style="width:28px;height:28px;border:2.5px solid #e2e8f0;border-top-color:#f59e0b;border-radius:50%;animation:spin 0.7s linear infinite"></div>
        </div>
      </div>`;

    loadStudentsTable();
  }

  async function loadStudentsTable() {
    let students;
    try { students = await api.get('/teacher/students?limit=6'); }
    catch {
      students = [
        { name:'Ali Hassan',     email:'ali@demo.com',    course:'Python Fundamentals',  progress:75, status:'active'   },
        { name:'Nour Salem',     email:'nour@demo.com',   course:'UI/UX Design Basics',  progress:40, status:'active'   },
        { name:'Omar Khaled',    email:'omar@demo.com',   course:'Data Structures',       progress:90, status:'active'   },
        { name:'Layla Ibrahim',  email:'layla@demo.com',  course:'Statistics',            progress:20, status:'inactive' },
        { name:'Yusuf Mansour',  email:'yusuf@demo.com',  course:'Python Fundamentals',  progress:55, status:'active'   },
      ];
    }
    const wrap = document.getElementById('students-table-wrap');
    if (!students.length) { wrap.innerHTML = '<div class="empty-state"><div class="empty-icon">👥</div><h3>No students yet</h3><p>Students will appear here once they enroll.</p></div>'; return; }
    wrap.innerHTML = `
      <table class="data-table">
        <thead>
          <tr>
            <th>Student</th>
            <th>Course</th>
            <th>Progress</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>
          ${students.map(s => `
            <tr>
              <td>
                <div style="display:flex;align-items:center;gap:10px">
                  <div class="course-card__avatar-sm" style="width:32px;height:32px;font-size:12px">${s.name.split(' ').map(w=>w[0]).join('')}</div>
                  <div>
                    <div style="font-weight:600;font-size:14px">${s.name}</div>
                    <div style="font-size:12px;color:var(--gray-400)">${s.email}</div>
                  </div>
                </div>
              </td>
              <td>${s.course}</td>
              <td>
                <div style="display:flex;align-items:center;gap:10px">
                  <div style="flex:1;height:6px;background:var(--gray-100);border-radius:99px;overflow:hidden">
                    <div style="height:100%;width:${s.progress}%;background:linear-gradient(90deg,var(--amber),var(--amber-dark));border-radius:99px"></div>
                  </div>
                  <span style="font-size:12px;font-weight:600;color:var(--navy);min-width:30px">${s.progress}%</span>
                </div>
              </td>
              <td><span class="badge ${s.status==='active'?'badge-green':'badge-gray'}">${s.status}</span></td>
            </tr>`).join('')}
        </tbody>
      </table>`;
  }

  /* ====== STUDENT DASHBOARD ====== */
  async function loadStudentDashboard() {
    document.getElementById('page-title').textContent       = 'Student Dashboard';
    document.getElementById('page-title-crumb').textContent = 'Overview';

    let stats, enrolled, upcomingExams;
    try {
      [stats, enrolled, upcomingExams] = await Promise.all([
        api.get('/student/stats'),
        api.get('/student/courses?limit=4'),
        api.get('/student/exams/upcoming'),
      ]);
    } catch {
      stats = { completedCourses: 3, inProgressCourses: 2, totalExams: 8, avgScore: 87 };
      enrolled = [
        { id:1, title:'Python Fundamentals',   category:'Programming', emoji:'🐍', lessonsCount:12, duration:'6 weeks', rating:'4.9', instructorName:'Ms. Sarah', level:'Beginner',     progress:75 },
        { id:2, title:'UI/UX Design Basics',    category:'Design',      emoji:'🎨', lessonsCount:10, duration:'4 weeks', rating:'4.8', instructorName:'Mr. Karim', level:'Beginner',     progress:40 },
        { id:3, title:'Data Structures & Algo', category:'Programming', emoji:'🌳', lessonsCount:18, duration:'8 weeks', rating:'4.7', instructorName:'Dr. Mona',  level:'Intermediate', progress:20 },
      ];
      upcomingExams = [
        { id:1, title:'Python Midterm',  courseName:'Python Fundamentals', dueDate:'2025-03-20', questionsCount:20, duration:30, status:'pending' },
        { id:2, title:'Design Quiz #3',  courseName:'UI/UX Design Basics', dueDate:'2025-03-22', questionsCount:15, duration:20, status:'pending' },
      ];
    }

    const content = document.getElementById('dashboard-content');
    content.innerHTML = `
      <!-- Welcome banner -->
      <div style="background:var(--navy);border-radius:var(--radius);padding:28px 32px;margin-bottom:28px;display:flex;align-items:center;justify-content:space-between;position:relative;overflow:hidden">
        <div style="position:absolute;inset:0;background:radial-gradient(ellipse at 80% 50%,rgba(245,158,11,0.15),transparent 60%)"></div>
        <div style="position:relative;z-index:1">
          <div style="font-size:13px;color:rgba(255,255,255,0.5);margin-bottom:6px">Good ${getGreeting()},</div>
          <div style="font-family:var(--font-head);font-size:24px;color:var(--white)">${user?.name || 'Student'} 👋</div>
          <div style="font-size:14px;color:rgba(255,255,255,0.5);margin-top:6px">Keep up the great work! You're on a 5-day learning streak 🔥</div>
        </div>
        <div style="position:relative;z-index:1;text-align:center;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:var(--radius);padding:16px 24px">
          <div style="font-family:var(--font-head);font-size:32px;color:var(--amber)">${stats.avgScore}%</div>
          <div style="font-size:12px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:0.08em">Avg. Score</div>
        </div>
      </div>

      <!-- Stats -->
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-card__icon">✅</div>
          <div class="stat-card__num">${stats.completedCourses}</div>
          <div class="stat-card__label">Courses Completed</div>
        </div>
        <div class="stat-card">
          <div class="stat-card__icon">📖</div>
          <div class="stat-card__num">${stats.inProgressCourses}</div>
          <div class="stat-card__label">In Progress</div>
        </div>
        <div class="stat-card">
          <div class="stat-card__icon">📝</div>
          <div class="stat-card__num">${stats.totalExams}</div>
          <div class="stat-card__label">Exams Taken</div>
        </div>
        <div class="stat-card">
          <div class="stat-card__icon">🏆</div>
          <div class="stat-card__num">${stats.avgScore}%</div>
          <div class="stat-card__label">Avg. Score</div>
          <div class="stat-card__change up">↑ 5% vs last month</div>
        </div>
      </div>

      <!-- Continue Learning -->
      <div class="section-header">
        <div class="section-title">Continue Learning</div>
        <a href="courses.html" class="section-link">View all →</a>
      </div>
      <div class="cards-grid">
        ${enrolled.map(renderCourseCard).join('')}
      </div>

      <!-- Upcoming Exams -->
      <div class="section-header" style="margin-top:40px">
        <div class="section-title">Upcoming Exams</div>
        <a href="exams.html" class="section-link">View all →</a>
      </div>
      <div class="exams-grid" style="grid-template-columns:repeat(auto-fill,minmax(260px,1fr))">
        ${upcomingExams.map(renderExamCard).join('')}
      </div>`;
  }

  function getGreeting() {
    const h = new Date().getHours();
    if (h < 12) return 'morning';
    if (h < 18) return 'afternoon';
    return 'evening';
  }

  /* ---- Create course form submit ---- */
  document.getElementById('create-course-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const titleIn = document.getElementById('course-title');
    const catIn   = document.getElementById('course-category');
    const err = validateField(titleIn, 'required');
    setFieldError(titleIn, err);
    if (err) return;

    const btn = document.getElementById('create-course-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner" style="border-top-color:var(--navy)"></span>Creating…';

    try {
      await api.post('/courses', {
        title:       titleIn.value.trim(),
        category:    catIn.value,
        level:       document.getElementById('course-level').value,
        duration:    document.getElementById('course-duration').value,
        description: document.getElementById('course-desc').value,
      });
    } catch { /* Demo: ignore API error */ }

    closeModal('create-course-modal');
    showToast('Course created successfully! 🎉', 'success');
    btn.disabled = false;
    btn.textContent = 'Create Course';
    e.target.reset();
    setTimeout(() => window.location.href = 'courses.html', 1000);
  });

  /* ---- Init ---- */
  loadDashboard();
</script>
</body>
</html>
